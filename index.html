<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tk Ananda - Sistem Keuangan</title>
    <link rel="icon" type="image/jpg" href="pic/logo.png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1bXxxh-Nd_lm8Fduo_1kiNmI_3KozwUc",
            authDomain: "lku-tk-ananda.firebaseapp.com",
            projectId: "lku-tk-ananda",
            storageBucket: "lku-tk-ananda.firebasestorage.app",
            messagingSenderId: "310516809206",
            appId: "1:310516809206:web:f545e45967fccff5ce1bd7",
            measurementId: "G-T6YMGQB0X7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const dbCloud = getFirestore(app);
        const provider = new GoogleAuthProvider();
        let currentUser = null;

        // --- KONFIGURASI AKSES ---
        const EMAIL_PENGELOLA = "febriana.harvey@gmail.com"; 

        window.login = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            const authBtn = document.getElementById('authBtn');
            const btnRekap = document.getElementById('btnRekapMaster');
            
            if (user) {
                currentUser = user;
                authBtn.innerHTML = ` ${user.displayName.split(' ')[0]} (Keluar)`;
                authBtn.onclick = window.logout;
                authBtn.className = "text-[10px] font-semibold text-red-400 hover:text-red-600 cursor-pointer border border-red-100 px-2 py-1 rounded";
                
                // Cek akses tombol rekap
                if (user.email === EMAIL_PENGELOLA) {
                    btnRekap.classList.remove('hidden');
                } else {
                    btnRekap.classList.add('hidden');
                }
                
                loadDataCloud();
            } else {
                currentUser = null;
                authBtn.innerHTML = "Login Google";
                authBtn.onclick = window.login;
                authBtn.className = "bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-blue-700 shadow-md cursor-pointer";
                btnRekap.classList.add('hidden');
                window.db = [];
                renderTabel(); 
            }
        });

        window.importDataHistoris = async () => {
            if (!currentUser) return Swal.fire("Akses Ditolak", "Login dulu!", "warning");
            
            // Validasi Double Check
            if (currentUser.email !== EMAIL_PENGELOLA) {
                return Swal.fire("Akses Dilarang", "Hanya Bunda yang bisa menggunakan fitur ini.", "error");
            }

            const dataMaster = {
    "REKAP 2024-2025": [
        { t: "Juli", d: 116700000, k: 46656884 },
        { t: "Agustus", d: 49159000, k: 32222400 },
        { t: "September", d: 17700000, k: 23224987 },
        { t: "Oktober", d: 21800000, k: 39156000 },
        { t: "November", d: 14900000, k: 18334900 },
        { t: "Desember", d: 20550000, k: 12114486 },
        { t: "Januari", d: 18225000, k: 14419564 },
        { t: "Februari", d: 12500000, k: 36291394 },
        { t: "Maret", d: 13550000, k: 15116207 },
        { t: "April", d: 15900000, k: 12566518 },
        { t: "Mei", d: 14600000, k: 42627075 },
        { t: "Juni", d: 12100000, k: 32225648 }
    ]
};
           

            const confirm = await Swal.fire({
                title: 'Susun Rekap Data?',
                text: "Data historis akan disusun otomatis ke folder Arsip.",
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Ya, Susun Sekarang'
            });

            if (!confirm.isConfirmed) return;

            Swal.fire({ title: 'Memproses...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                for (const [tahun, list] of Object.entries(dataMaster)) {
                    await setDoc(doc(dbCloud, `users/${currentUser.uid}/arsip`, tahun), { nama: tahun, tipe: "TAHUNAN", createdAt: Date.now() });
                    for (let i = 0; i < list.length; i++) {
                        await addDoc(collection(dbCloud, `users/${currentUser.uid}/arsip/${tahun}/data`), {
                            tanggal: list[i].t, 
                            keterangan: "-", 
                            debet: list[i].d, 
                            kredit: list[i].k, 
                            createdAt: Date.now() + i
                        });
                    }
                }
                Swal.fire("Berhasil", "Semua data historis telah disusun.", "success");
            } catch (e) { Swal.fire("Gagal", e.message, "error"); }
        };

        function loadDataCloud() {
            const q = query(collection(dbCloud, `users/${currentUser.uid}/transaksi`), orderBy("createdAt", "asc"));
            onSnapshot(q, (snapshot) => {
                const data = [];
                snapshot.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
                window.db = data;
                renderTabel();
            });
        }

        window.tambahData = async () => {
            if (!currentUser) return Swal.fire("Akses Ditolak", "Login dulu!", "warning");
            const tgl = document.getElementById('inputTanggal').value;
            const ket = document.getElementById('inputKeterangan').value;
            const deb = cleanNumber(document.getElementById('inputDebet').value);
            const kre = cleanNumber(document.getElementById('inputKredit').value);
            if (tgl.length < 10) return Swal.fire("Input Salah", "Format: DD/MM/YYYY", "info");

            try {
                await addDoc(collection(dbCloud, `users/${currentUser.uid}/transaksi`), {
                    tanggal: tgl, keterangan: ket, debet: deb, kredit: kre, createdAt: Date.now()
                });
                document.getElementById('inputKeterangan').value = "";
                document.getElementById('inputDebet').value = "";
                document.getElementById('inputKredit').value = "";
            } catch (e) { Swal.fire("Error", e.message, "error"); }
        };

        window.hapusSemua = async () => {
            if (!currentUser) return;
            const res = await Swal.fire({ title: 'Hapus Semua?', icon: 'warning', showCancelButton: true });
            if (res.isConfirmed) {
                const snapshot = await getDocs(collection(dbCloud, `users/${currentUser.uid}/transaksi`));
                for (const d of snapshot.docs) await deleteDoc(d.ref);
            }
        };

        window.hapusBaris = async (id) => {
            if (confirm("Hapus baris ini?")) await deleteDoc(doc(dbCloud, `users/${currentUser.uid}/transaksi`, id));
        };

        window.arsipkanData = async () => {
            if (!currentUser || window.db.length === 0) return;
            const { value: nama } = await Swal.fire({ title: 'Nama Arsip', input: 'text', showCancelButton: true });
            if (!nama) return;
            try {
                await setDoc(doc(dbCloud, `users/${currentUser.uid}/arsip`, nama), { nama: nama });
                for (const item of window.db) {
                    await addDoc(collection(dbCloud, `users/${currentUser.uid}/arsip/${nama}/data`), { ...item });
                    await deleteDoc(doc(dbCloud, `users/${currentUser.uid}/transaksi`, item.id));
                }
                Swal.fire('Berhasil!', '', 'success');
            } catch (e) { Swal.fire("Error", e.message, "error"); }
        };
    </script>
    </head>
<body class="bg-gray-100 p-2 md:p-10">
    <div class="max-w-5xl mx-auto bg-white p-4 md:p-8 shadow-xl rounded-lg relative">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b pb-6 mb-6 gap-4">
            <div class="flex flex-wrap items-center gap-3 w-full md:w-auto">
                <img src="pic/logo.png" alt="Logo" class="h-10 md:h-14 w-auto object-contain">
                <div class="flex gap-2">
                    <a href="arsip.html" class="flex items-center gap-2 px-3 py-2 border-2 border-gray-200 rounded-lg text-gray-600 hover:border-green-600 hover:text-green-700 transition-all bg-white">
                        <span class="text-[10px] font-black uppercase">Arsip</span>
                    </a>
                </div>
            </div>
            <div class="w-full md:w-auto flex justify-end no-print">
                <button id="authBtn"></button>
            </div>
        </div>
        <div class="no-print mb-6">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3">
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-gray-400">TANGGAL</label>
                    <input type="text" id="inputTanggal" onkeyup="formatTanggal(this)" placeholder="DD/MM/YYYY" maxlength="10" class="p-2 border rounded w-full">
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-gray-400">KETERANGAN</label>
                    <input type="text" id="inputKeterangan" placeholder="Keterangan" class="p-2 border rounded w-full">
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-gray-400">DEBET</label>
                    <input type="text" id="inputDebet" onkeyup="formatInput(this)" placeholder="0" class="p-2 border rounded w-full">
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-gray-400">KREDIT</label>
                    <input type="text" id="inputKredit" onkeyup="formatInput(this)" placeholder="0" class="p-2 border rounded w-full">
                </div>
                <div class="flex items-end">
                    <button onclick="tambahData()" class="w-full bg-blue-600 text-white font-bold py-2 rounded shadow-md hover:bg-blue-700">Simpan</button>
                </div>
            </div>
        </div>

        <div id="areaLaporan">
            <h1 class="text-xl md:text-2xl font-semibold text-center mb-6 uppercase tracking-wider text-green-900">Laporan Keuangan Tk Ananda</h1>
            <div class="table-container">
                <table class="w-full border-collapse border-2 border-green-800">
                    <thead>
                        <tr class="bg-green-600 text-white border-b-2 border-green-800 text-[11px] md:text-sm">
                            <th class="border border-green-800 p-2 w-10">NO</th>
                            <th class="border border-green-800 p-2 w-24">TANGGAL</th>
                            <th class="border border-green-800 p-2">KETERANGAN</th>
                            <th class="border border-green-800 p-2 w-24 text-right">DEBET</th>
                            <th class="border border-green-800 p-2 w-24 text-right">KREDIT</th>
                            <th class="border border-green-800 p-2 w-28 text-right">SALDO</th>
                            <th class="border border-green-800 p-2 w-8 no-print"></th> 
                        </tr>
                    </thead>
                    <tbody id="bodyTabel" class="text-[11px] md:text-sm"></tbody>
                    <tfoot id="footerTabel" class="bg-green-100 font-bold border-t-2 border-green-800 text-green-900"></tfoot>
                </table>
            </div>
        </div>
        
        <div class="mt-8 flex flex-col sm:flex-row gap-4 justify-between items-center no-print">
            <div class="flex gap-2 w-full sm:w-auto">
                <button onclick="downloadPDF()" class="bg-red-600 text-white px-6 py-2 rounded shadow">📄 PDF</button>
                <button onclick="downloadExcel()" class="bg-green-700 text-white px-6 py-2 rounded shadow">📊 Excel</button>
                <button onclick="arsipkanData()" class="bg-yellow-600 text-white px-6 py-2 rounded shadow">📦 Arsipkan</button>
            </div>
            <button onclick="hapusSemua()" class="text-red-400 text-xs hover:underline">Hapus Semua Data</button>
        </div>
    </div>

    <script>
        window.db = [];
        function formatInput(input) {
            let v = input.value.replace(/\D/g, "");
            if (v) input.value = new Intl.NumberFormat('id-ID').format(v);
        }
        function formatTanggal(input) {
            let v = input.value.replace(/\D/g, '').slice(0, 8);
            if (v.length >= 5) input.value = `${v.slice(0, 2)}/${v.slice(2, 4)}/${v.slice(4)}`;
            else if (v.length >= 3) input.value = `${v.slice(0, 2)}/${v.slice(2)}`;
            else input.value = v;
        }
        function cleanNumber(str) {
            return parseFloat(str.toString().replace(/\./g, "")) || 0;
        }

        function renderTabel() {
            const body = document.getElementById('bodyTabel');
            const footer = document.getElementById('footerTabel');
            body.innerHTML = "";
            let saldo = 0, totalD = 0, totalK = 0;

            window.db.forEach((item, i) => {
                saldo += (item.debet - item.kredit);
                totalD += item.debet; totalK += item.kredit;
                body.innerHTML += `
                    <tr class="odd:bg-white even:bg-green-50/30">
                        <td class="border border-green-800 p-2 text-center">${i + 1}</td>
                        <td class="border border-green-800 p-2 text-center">${item.tanggal}</td>
                        <td class="border border-green-800 p-2 uppercase">${item.keterangan}</td>
                        <td class="border border-green-800 p-2 text-right">${item.debet ? new Intl.NumberFormat('id-ID').format(item.debet) : ""}</td>
                        <td class="border border-green-800 p-2 text-right text-red-600">${item.kredit ? new Intl.NumberFormat('id-ID').format(item.kredit) : ""}</td>
                        <td class="border border-green-800 p-2 text-right font-bold">${new Intl.NumberFormat('id-ID').format(saldo)}</td>
                        <td class="border border-green-800 p-2 text-center no-print">
                            <button onclick="hapusBaris('${item.id}')" class="text-red-400 font-bold px-1">✕</button> 
                        </td>
                    </tr>`;
            });

            footer.innerHTML = `
                <tr>
                    <td colspan="3" class="border border-green-800 p-2 text-center uppercase">TOTAL</td>
                    <td class="border border-green-800 p-2 text-right">${new Intl.NumberFormat('id-ID').format(totalD)}</td>
                    <td class="border border-green-800 p-2 text-right">${new Intl.NumberFormat('id-ID').format(totalK)}</td>
                    <td class="border border-green-800 p-2 text-right bg-green-200">${new Intl.NumberFormat('id-ID').format(totalD - totalK)}</td>
                    <td class="border border-green-800 p-2 no-print bg-green-200"></td>
                </tr>`;
        }

        // ... (Fungsi downloadPDF & Excel tetap sama)
    </script>
</body>
</html>
