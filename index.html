<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tk Ananda - Sistem Keuangan</title>

    <link rel="icon" type="image/jpg" href="pic/logo.png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, getDocs, doc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyC1bXxxh-Nd_lm8Fduo_1kiNmI_3KozwUc",
            authDomain: "lku-tk-ananda.firebaseapp.com",
            projectId: "lku-tk-ananda",
            storageBucket: "lku-tk-ananda.firebasestorage.app",
            messagingSenderId: "310516809206",
            appId: "1:310516809206:web:f545e45967fccff5ce1bd7",
            measurementId: "G-T6YMGQB0X7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const dbCloud = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;

        window.login = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            const authBtn = document.getElementById('authBtn');
            if (user) {
                currentUser = user;
                authBtn.innerHTML = ` ${user.displayName.split(' ')[0]} (Keluar)`;
                authBtn.onclick = window.logout;
                authBtn.className = "text-[10px] font-semibold text-red-400 hover:text-red-600 transition cursor-pointer border border-red-100 px-2 py-1 rounded whitespace-nowrap";
                loadDataCloud();
            } else {
                currentUser = null;
                authBtn.innerHTML = "Login Google";
                authBtn.onclick = window.login;
                authBtn.className = "bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-blue-700 transition shadow-md cursor-pointer whitespace-nowrap";
                renderTabel([]); 
            }
        });

        function loadDataCloud() {
            const q = query(collection(dbCloud, `users/${currentUser.uid}/transaksi`), orderBy("createdAt", "asc"));
            onSnapshot(q, (snapshot) => {
                const data = [];
                snapshot.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
                window.db = data;
                renderTabel();
            });
        }

        window.tambahData = async () => {
            if (!currentUser) return Swal.fire("Akses Ditolak", "Silakan login terlebih dahulu!", "warning");
            const tgl = document.getElementById('inputTanggal').value;
            const ket = document.getElementById('inputKeterangan').value;
            const deb = cleanNumber(document.getElementById('inputDebet').value);
            const kre = cleanNumber(document.getElementById('inputKredit').value);

            if (tgl.length < 10) return Swal.fire("Input Salah", "Format tanggal harus DD/MM/YYYY!", "info");

            try {
                await addDoc(collection(dbCloud, `users/${currentUser.uid}/transaksi`), {
                    tanggal: tgl, keterangan: ket, debet: deb, kredit: kre, createdAt: Date.now()
                });
                document.getElementById('inputKeterangan').value = "";
                document.getElementById('inputDebet').value = "";
                document.getElementById('inputKredit').value = "";
                
            } catch (e) { Swal.fire("Error", e.message, "error"); }
        };

        window.hapusSemua = async () => {
            if (!currentUser) return Swal.fire("Akses Ditolak", "Silakan login terlebih dahulu!", "warning");
            
            const result = await Swal.fire({
                title: 'Hapus Semua Data?',
                text: "Semua data transaksi akan dihapus permanen dari sistem!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Ya, Hapus Semua',
                cancelButtonText: 'Batal'
            });

            if (result.isConfirmed) {
                try {
                    const colRef = collection(dbCloud, `users/${currentUser.uid}/transaksi`);
                    const snapshot = await getDocs(colRef);
                    const promises = snapshot.docs.map(d => deleteDoc(d.ref));
                    await Promise.all(promises);
                    Swal.fire('Terhapus!', 'Database transaksi telah dibersihkan.', 'success');
                } catch (e) { Swal.fire("Gagal", e.message, "error"); }
            }
        };

        window.hapusBaris = async (id) => {
            const item = window.db.find(d => d.id === id);
            if (!item) return;

            const result = await Swal.fire({
                title: 'Hapus Baris?',
                text: `Yakin ingin menghapus "${item.keterangan}"?`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                confirmButtonText: 'Hapus'
            });

            if (result.isConfirmed) {
                try {
                    await deleteDoc(doc(dbCloud, `users/${currentUser.uid}/transaksi`, id));
                } catch (e) { Swal.fire("Gagal", e.message, "error"); }
            }
        };

        window.arsipkanData = async () => {
            if (!currentUser || window.db.length === 0) return Swal.fire("Kosong", "Tidak ada data untuk diarsip!", "info");
            
            const { value: namaArsip } = await Swal.fire({
                title: 'Pindahkan ke Arsip',
                input: 'text',
                inputLabel: 'Masukkan Nama Laporan (Contoh: Laporan Maret)',
                inputPlaceholder: 'Nama Laporan...',
                showCancelButton: true
            });

            if (!namaArsip) return;

            Swal.fire({ title: 'Mengarsipkan...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });

            try {
                await setDoc(doc(dbCloud, `users/${currentUser.uid}/arsip`, namaArsip), { nama: namaArsip });
                for (const item of window.db) {
                    await addDoc(collection(dbCloud, `users/${currentUser.uid}/arsip/${namaArsip}/data`), {
                        tanggal: item.tanggal, keterangan: item.keterangan, debet: item.debet, kredit: item.kredit, createdAt: item.createdAt || Date.now()
                    });
                    await deleteDoc(doc(dbCloud, `users/${currentUser.uid}/transaksi`, item.id));
                }
                Swal.fire('Berhasil!', 'Data telah dipindahkan ke folder Arsip.', 'success');
            } catch (e) { Swal.fire("Error", e.message, "error"); }
        };

        window.prosesSimpanRekapDariTabel = async () => {
            if (!currentUser) return Swal.fire("Akses Ditolak", "Silakan login!", "warning");
            
            const { value: tahun } = await Swal.fire({
                title: 'Rekap Tahunan',
                input: 'text',
                inputLabel: 'Masukkan Tahun Rekap (Contoh: 2024)',
                showCancelButton: true
            });

            if (!tahun) return;
            const namaArsip = `REKAP TAHUNAN ${tahun}`;
            const semuaBaris = document.querySelectorAll('.baris-rekap');
            
            if (semuaBaris.length === 0) return Swal.fire("Gagal", "Tabel input tidak ditemukan.", "error");

            Swal.fire({ title: 'Menyimpan...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });

            try {
                await setDoc(doc(dbCloud, `users/${currentUser.uid}/arsip`, namaArsip), { nama: namaArsip, tanggalArsip: Date.now(), tipe: "TAHUNAN" });
                for (let i = 0; i < semuaBaris.length; i++) {
                    const baris = semuaBaris[i];
                    const bulan = baris.querySelector('.nama-bulan').innerText;
                    const debet = cleanNumber(baris.querySelector('.input-debet').value);
                    const kredit = cleanNumber(baris.querySelector('.input-kredit').value);

                    await addDoc(collection(dbCloud, `users/${currentUser.uid}/arsip/${namaArsip}/data`), {
                        tanggal: bulan, keterangan: `REKAP BULAN ${bulan.toUpperCase()} ${tahun}`, debet: debet, kredit: kredit, createdAt: Date.now() + i
                    });
                }
                Swal.fire('Selesai', 'Data rekap tahunan telah disimpan.', 'success').then(() => location.reload());
            } catch (e) { Swal.fire("Gagal", e.message, "error"); }
        };
    </script>

    <style>
        .table-container { width: 100%; overflow-x: auto; }
        @media (max-width: 640px) {
            table { font-size: 0.8rem; }
            th, td { padding: 0.5rem 0.25rem !important; }
        }
    </style>
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16a34a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body class="bg-gray-100 p-2 md:p-10">
    <div class="max-w-5xl mx-auto bg-white p-4 md:p-8 shadow-xl rounded-lg relative">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b pb-6 mb-6 gap-4">
            <div class="flex flex-wrap items-center gap-3 w-full md:w-auto">
                <img src="pic/logo.png" alt="Logo" class="h-10 md:h-14 w-auto object-contain">
                
                <div class="flex gap-2">
                    <a href="arsip.html" class="flex items-center gap-2 px-3 py-2 border-2 border-gray-200 rounded-lg text-gray-600 hover:border-green-600 hover:text-green-700 transition-all shadow-sm bg-white">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4" />
                        </svg>
                        <span class="text-[10px] font-black uppercase tracking-wider">Arsip</span>
                    </a>
                    <a href="input_lama.html" class="flex items-center gap-2 px-3 py-2 border-2 border-purple-200 rounded-lg text-purple-600 hover:border-purple-600 hover:text-purple-700 transition-all shadow-sm bg-white">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <span class="text-[10px] font-black uppercase tracking-wider">Input Bulanan</span>
                    </a>
                </div>
            </div>

            <div class="w-full md:w-auto flex justify-end no-print">
                <button id="authBtn"></button>
            </div>
        </div>

        <div class="no-print mb-6">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3">
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-gray-400 ml-1">TANGGAL</label>
                    <input type="text" id="inputTanggal" onkeyup="formatTanggal(this)" placeholder="DD/MM/YYYY" maxlength="10" class="p-2 border rounded outline-none w-full">
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-gray-400 ml-1">KETERANGAN</label>
                    <input type="text" id="inputKeterangan" placeholder="Keterangan" class="p-2 border rounded outline-none w-full">
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-gray-400 ml-1">DEBET (MASUK)</label>
                    <input type="text" id="inputDebet" onkeyup="formatInput(this)" placeholder="0" class="p-2 border rounded outline-none w-full">
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-gray-400 ml-1">KREDIT (KELUAR)</label>
                    <input type="text" id="inputKredit" onkeyup="formatInput(this)" placeholder="0" class="p-2 border rounded outline-none w-full">
                </div>
                <div class="flex items-end">
                    <button onclick="tambahData()" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700 shadow-md">Simpan</button>
                </div>
            </div>
        </div>

        <div id="areaLaporan">
            <h1 class="text-xl md:text-2xl font-semibold text-center mb-6 uppercase tracking-wider text-green-900">Laporan Keuangan Tk Ananda</h1>
            <div class="table-container">
                <table class="w-full border-collapse border-2 border-green-800">
                    <thead>
                        <tr class="bg-green-600 text-white border-b-2 border-green-800 text-[11px] md:text-sm">
                            <th class="border border-green-800 p-2 w-10">NO</th>
                            <th class="border border-green-800 p-2 w-24">TANGGAL</th>
                            <th class="border border-green-800 p-2">KETERANGAN</th>
                            <th class="border border-green-800 p-2 w-24 text-right">DEBET</th>
                            <th class="border border-green-800 p-2 w-24 text-right">KREDIT</th>
                            <th class="border border-green-800 p-2 w-28 text-right">SALDO</th>
                            <th class="border border-green-800 p-2 w-8 no-print bg-green-700"></th> 
                        </tr>
                    </thead>
                    <tbody id="bodyTabel" class="text-[11px] md:text-sm"></tbody>
                    <tfoot id="footerTabel" class="bg-green-100 font-bold border-t-2 border-green-800 text-green-900 text-[11px] md:text-sm"></tfoot>
                </table>
            </div>
        </div>
        
        <div class="mt-8 flex flex-col sm:flex-row gap-4 justify-between items-center no-print">
            <div class="flex gap-2 w-full sm:w-auto">
                <button onclick="downloadPDF()" class="flex-1 sm:flex-none bg-red-600 text-white px-6 py-2 rounded shadow hover:bg-red-700">📄 PDF</button>
                <button onclick="downloadExcel()" class="flex-1 sm:flex-none bg-green-700 text-white px-6 py-2 rounded shadow hover:bg-green-800">📊 Excel</button>
                <button onclick="window.arsipkanData()" class="flex-1 sm:flex-none bg-yellow-600 text-white px-6 py-2 rounded shadow hover:bg-yellow-700">📦 Arsipkan</button>
            </div>

            <button onclick="hapusSemua()" class="text-red-400 text-xs hover:underline">Hapus Semua Data</button>
        </div>
    </div>

    <script>
        window.db = [];

        function formatInput(input) {
            let v = input.value.replace(/\D/g, "");
            if (v) input.value = new Intl.NumberFormat('id-ID').format(v);
        }

        function formatTanggal(input) {
            let v = input.value.replace(/\D/g, '').slice(0, 8);
            if (v.length >= 5) input.value = `${v.slice(0, 2)}/${v.slice(2, 4)}/${v.slice(4)}`;
            else if (v.length >= 3) input.value = `${v.slice(0, 2)}/${v.slice(2)}`;
            else input.value = v;
        }

        function cleanNumber(str) {
            return parseFloat(str.toString().replace(/\./g, "")) || 0;
        }

        function renderTabel() {
            const body = document.getElementById('bodyTabel');
            const footer = document.getElementById('footerTabel');
            body.innerHTML = "";
            let saldo = 0, totalD = 0, totalK = 0;

           window.db.forEach((item, i) => {
    // Saldo tetap dihitung di latar belakang untuk keperluan akumulasi
    saldo += (item.debet - item.kredit);
    totalD += item.debet;
    totalK += item.kredit;

    // Logika pengecekan: tampilkan saldo hanya jika ada nominal debet atau kredit
    const tampilkanSaldo = (item.debet !== 0 || item.kredit !== 0) 
        ? new Intl.NumberFormat('id-ID').format(saldo) 
        : "";

    body.innerHTML += `
        <tr class="odd:bg-white even:bg-green-50/30">
            <td class="border border-green-800 p-2 text-center">${i + 1}</td>
            <td class="border border-green-800 p-2 text-center">${item.tanggal}</td>
            <td class="border border-green-800 p-2 uppercase">${item.keterangan}</td>
            <td class="border border-green-800 p-2 text-right">${item.debet ? new Intl.NumberFormat('id-ID').format(item.debet) : ""}</td>
            <td class="border border-green-800 p-2 text-right text-red-600">${item.kredit ? new Intl.NumberFormat('id-ID').format(item.kredit) : ""}</td>
            <td class="border border-green-800 p-2 text-right font-bold">${tampilkanSaldo}</td>
            <td class="border border-green-800 p-2 text-center no-print">
                <button onclick="window.hapusBaris('${item.id}')" class="text-red-400 hover:text-red-600 font-bold px-1">✕</button> 
            </td>
        </tr>`;
});

            footer.innerHTML = `
                <tr>
                    <td colspan="3" class="border border-green-800 p-2 text-center uppercase">JUMLAH TOTAL</td>
                    <td class="border border-green-800 p-2 text-right">${new Intl.NumberFormat('id-ID').format(totalD)}</td>
                    <td class="border border-green-800 p-2 text-right">${new Intl.NumberFormat('id-ID').format(totalK)}</td>
                    <td class="border border-green-800 p-2 text-right bg-green-200">${new Intl.NumberFormat('id-ID').format(totalD - totalK)}</td>
                    <td class="border border-green-800 p-2 no-print bg-green-200"></td>
                </tr>`;
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            doc.setFontSize(18);
            doc.setTextColor(6, 78, 59);
            doc.text("LAPORAN KEUANGAN TK ANANDA", 148, 20, { align: "center" });
            
            let saldoTemp = 0;
            const rows = window.db.map((item, i) => {
                saldoTemp += (item.debet - item.kredit);
                return [i + 1, item.tanggal, item.keterangan.toUpperCase(), 
                        item.debet ? new Intl.NumberFormat('id-ID').format(item.debet) : "-", 
                        item.kredit ? new Intl.NumberFormat('id-ID').format(item.kredit) : "-", 
                        new Intl.NumberFormat('id-ID').format(saldoTemp)];
            });

            const totalD = window.db.reduce((a, b) => a + b.debet, 0);
            const totalK = window.db.reduce((a, b) => a + b.kredit, 0);
            rows.push([
                { content: 'JUMLAH TOTAL', colSpan: 3, styles: { halign: 'center', fillColor: [220, 252, 231] } },
                { content: new Intl.NumberFormat('id-ID').format(totalD), styles: { fillColor: [220, 252, 231] } },
                { content: new Intl.NumberFormat('id-ID').format(totalK), styles: { fillColor: [220, 252, 231] } },
                { content: new Intl.NumberFormat('id-ID').format(totalD - totalK), styles: { fillColor: [187, 247, 208] } }
            ]);

            doc.autoTable({
                startY: 30,
                head: [['NO', 'TANGGAL', 'KETERANGAN', 'DEBET', 'KREDIT', 'SALDO']],
                body: rows,
                theme: 'grid',
                headStyles: { fillColor: [22, 163, 74], halign: 'center' },
                columnStyles: { 0: {halign:'center'}, 1: {halign:'center'}, 3: {halign:'right'}, 4: {halign:'right'}, 5: {halign:'right', fontStyle:'bold'} }
            });
            doc.save("Laporan_Keuangan_TK_Ananda.pdf");
        }

        function downloadExcel() {
            if (!window.db.length) return Swal.fire("Kosong", "Tidak ada data!", "info");
            let s = 0;
            const data = window.db.map((item, i) => {
                s += (item.debet - item.kredit);
                return { "No": i+1, "Tanggal": item.tanggal, "Keterangan": item.keterangan, "Debet": item.debet, "Kredit": item.kredit, "Saldo": s };
            });
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Laporan");
            XLSX.writeFile(wb, "Laporan_Keuangan_TK_Ananda.xlsx");
        }
    </script>
    <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('PWA Ready'))
        .catch(err => console.log('PWA Failed', err));
    });
  }
</script>
</body>
</html>
