<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Tk Ananda - Sistem Keuangan</title>

    <link rel="icon" type="image/jpg" href="pic/logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .input-clean {
            border: none; background: transparent; width: 100%;
            outline: none; text-align: right; font-weight: 600;
        }
        input { font-size: 16px !important; } 
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Konfigurasi Firebase Anda
        const firebaseConfig = {
            apiKey: "AIzaSyC1bXxxh-Nd_lm8Fduo_1kiNmI_3KozwUc",
            authDomain: "lku-tk-ananda.firebaseapp.com",
            projectId: "lku-tk-ananda",
            storageBucket: "lku-tk-ananda.firebasestorage.app",
            messagingSenderId: "310516809206",
            appId: "1:310516809206:web:f545e45967fccff5ce1bd7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let currentUser = null;

        // Cek Status Login
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "index.html";
            } else {
                currentUser = user;
            }
        });

        window.hitungSaldoBaris = () => {
            const rows = document.querySelectorAll('.baris-rekap');
            let grandTotalPenerimaan = 0;
            let grandTotalPengeluaran = 0;

            rows.forEach(row => {
                const pVal = parseFloat(row.querySelector('.input-penerimaan').value.replace(/\./g, '')) || 0;
                const eVal = parseFloat(row.querySelector('.input-pengeluaran').value.replace(/\./g, '')) || 0;
                
                const saldo = pVal - eVal;
                const colSaldo = row.querySelector('.kolom-saldo');
                
                colSaldo.innerText = new Intl.NumberFormat('id-ID').format(saldo);
                colSaldo.classList.toggle('text-rose-600', saldo < 0);

                grandTotalPenerimaan += pVal;
                grandTotalPengeluaran += eVal;
            });

            document.getElementById('totalPenerimaan').innerText = new Intl.NumberFormat('id-ID').format(grandTotalPenerimaan);
            document.getElementById('totalPengeluaran').innerText = new Intl.NumberFormat('id-ID').format(grandTotalPengeluaran);
            
            const totalSaldo = grandTotalPenerimaan - grandTotalPengeluaran;
            const elTotalSaldo = document.getElementById('totalSaldoAkhir');
            elTotalSaldo.innerText = new Intl.NumberFormat('id-ID').format(totalSaldo);
            elTotalSaldo.classList.toggle('text-rose-600', totalSaldo < 0);
        };

        window.formatRupiah = (input) => {
            let v = input.value.replace(/\D/g, "");
            if (v) input.value = new Intl.NumberFormat('id-ID').format(v);
            window.hitungSaldoBaris();
        };

        // Fungsi Simpan ke Firebase Firestore
        window.simpanKeArsip = async () => {
            const judul = document.getElementById('judulLaporan').value;
            if(!judul) return alert("Harap isi Judul Laporan (Misal: 2024)");
            if(!currentUser) return alert("Sesi berakhir, silakan login ulang.");
            
            if(!confirm(`Simpan data tahun ${judul} ke arsip?`)) return;

            const btn = document.getElementById('btnSimpan');
            btn.disabled = true;
            btn.innerText = "Menyimpan...";

            try {
                // 1. Buat Dokumen Induk di Koleksi 'arsip'
                const docRef = doc(db, `users/${currentUser.uid}/arsip`, judul);
                await setDoc(docRef, { 
                    nama: judul, 
                    tipe: "TAHUNAN", 
                    date: Date.now() 
                });

                // 2. Simpan Data per Bulan ke Sub-Koleksi 'data'
                const rows = document.querySelectorAll('.baris-rekap');
                for (let i = 0; i < rows.length; i++) {
                    const bulan = rows[i].querySelector('.nama-bulan').innerText;
                    const p = parseFloat(rows[i].querySelector('.input-penerimaan').value.replace(/\./g, '')) || 0;
                    const e = parseFloat(rows[i].querySelector('.input-pengeluaran').value.replace(/\./g, '')) || 0;

                    // Data tetap disimpan meski angka 0 (kolom kosong)
                    await addDoc(collection(db, `users/${currentUser.uid}/arsip/${judul}/data`), {
                        tanggal: bulan,
                        keterangan: `REKAP ${bulan.toUpperCase()} (${judul})`,
                        debet: p,
                        kredit: e,
                        createdAt: Date.now() + i
                    });
                }

                alert("Berhasil mengarsipkan data!");
                window.location.href = "arsip.html";
            } catch (err) {
                console.error(err);
                alert("Gagal menyimpan: " + err.message);
                btn.disabled = false;
                btn.innerText = "Simpan ke Arsip";
            }
        };

        // Render otomatis Januari - Desember
        window.onload = () => {
            const bulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            const tbody = document.getElementById('tableBody');
            bulan.forEach(b => {
                tbody.innerHTML += `
                    <tr class="baris-rekap border-b border-slate-50">
                        <td class="nama-bulan p-4 font-bold text-slate-700 whitespace-nowrap">${b}</td>
                        <td class="p-4"><input type="text" inputmode="numeric" onkeyup="formatRupiah(this)" class="input-penerimaan input-clean text-indigo-600" placeholder="0"></td>
                        <td class="p-4"><input type="text" inputmode="numeric" onkeyup="formatRupiah(this)" class="input-pengeluaran input-clean text-rose-500" placeholder="0"></td>
                        <td class="kolom-saldo p-4 text-right font-bold text-slate-900 bg-slate-50/50">0</td>
                    </tr>`;
            });
        };
    </script>
</head>
<body class="bg-[#F8FAFC] text-slate-800 antialiased">
    <div class="max-w-5xl mx-auto py-6 md:py-10 px-4 md:px-6">
        
        <div class="flex justify-between items-center mb-8">
            <a href="index.html" class="flex items-center gap-2 text-slate-500 hover:text-indigo-600 transition-colors font-bold text-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z" />
                </svg>
                Beranda
            </a>
            <h1 class="text-xl md:text-2xl font-black text-slate-900">Input Data Tahunan</h1>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-4 md:p-6 border-b border-slate-100 bg-slate-50/30">
                <label class="block text-[10px] uppercase font-bold text-slate-400 mb-2 tracking-widest">Judul Arsip / Tahun</label>
                <input type="text" id="judulLaporan" placeholder="Laporan Keuangan 2020" class="w-full bg-white p-4 rounded-2xl outline-none border border-slate-200 focus:border-indigo-500 font-bold text-lg shadow-inner">
            </div>

            <div class="overflow-x-auto">
                <table class="w-full min-w-[600px] md:min-w-full">
                    <thead>
                        <tr class="bg-slate-50 text-[10px] uppercase tracking-widest font-bold text-slate-400 border-b border-slate-100">
                            <th class="p-4 text-left">Bulan</th>
                            <th class="p-4 text-right">Penerimaan</th>
                            <th class="p-4 text-right">Pengeluaran</th>
                            <th class="p-4 text-right">Saldo</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                    <tfoot>
                        <tr class="bg-slate-900 text-white font-black text-xs md:text-sm">
                            <td class="p-4">TOTAL KESELURUHAN</td>
                            <td id="totalPenerimaan" class="p-4 text-right text-indigo-300">0</td>
                            <td id="totalPengeluaran" class="p-4 text-right text-rose-300">0</td>
                            <td id="totalSaldoAkhir" class="p-4 text-right bg-indigo-900/50">0</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>

        <div class="mt-8">
            <button id="btnSimpan" onclick="simpanKeArsip()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-5 rounded-2xl font-black text-lg shadow-xl shadow-indigo-100 transition-all active:scale-[0.98]">
                Simpan ke Arsip Permanen
            </button>
        </div>
    </div>
</body>
</html>
