<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Tk Ananda - Sistem Keuangan</title>

    <link rel="icon" type="image/jpg" href="pic/logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, orderBy, query, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1bXxxh-Nd_lm8Fduo_1kiNmI_3KozwUc",
            authDomain: "lku-tk-ananda.firebaseapp.com",
            projectId: "lku-tk-ananda",
            storageBucket: "lku-tk-ananda.firebasestorage.app",
            messagingSenderId: "310516809206",
            appId: "1:310516809206:web:f545e45967fccff5ce1bd7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUID = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUID = user.uid;
                loadDaftarArsip();
            } else {
                window.location.href = "index.html";
            }
        });

        async function loadDaftarArsip() {
    const container = document.getElementById('listArsip');
    try {
        const snap = await getDocs(collection(db, `users/${currentUID}/arsip`));
        container.innerHTML = snap.empty ? '<p class="text-gray-400">Belum ada arsip.</p>' : "";
        
        snap.forEach(doc => {
            container.innerHTML += `
                <div class="relative group">
                    <button onclick="window.lihatDetail('${doc.id}')" class="w-full text-left p-4 bg-white border-2 border-gray-100 rounded-xl hover:border-green-500 transition-all flex justify-between items-center shadow-sm">
                        <span class="font-bold text-gray-700 uppercase">${doc.id}</span>
                        <span class="text-green-600 font-bold text-xs opacity-0 group-hover:opacity-100 transition mr-8">BUKA →</span>
                    </button>
                    <button onclick="window.hapusArsip('${doc.id}')" class="absolute right-3 top-1/2 -translate-y-1/2 text-red-400 hover:text-red-600 p-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                </div>`;
        });
    } catch (e) { alert("Gagal memuat daftar: " + e.message); }
}

        window.lihatDetail = async (namaArsip) => {
    const detailArea = document.getElementById('detailArea');
    const tableBody = document.getElementById('bodyTabelArsip');
    const judulArsip = document.getElementById('judulArsip');
    
    // Ambil elemen tfoot untuk diisi angkanya nanti
    const elTotalDebet = document.getElementById('totalDebetArsip');
    const elTotalKredit = document.getElementById('totalKreditArsip');
    const elTotalSaldo = document.getElementById('totalSaldoArsip');
    
    detailArea.classList.remove('hidden');
    tableBody.innerHTML = "<tr><td colspan='6' class='p-4 text-center text-gray-400 italic'>Memuat data...</td></tr>";
    judulArsip.innerText = namaArsip;

    try {
        const q = query(collection(db, `users/${currentUID}/arsip/${namaArsip}/data`), orderBy("createdAt", "asc"));
        const snap = await getDocs(q);
        
        tableBody.innerHTML = ""; 
        let saldo = 0; 
        let totalDebet = 0;   // VARIABEL BARU
        let totalKredit = 0;  // VARIABEL BARU

        if (snap.empty) {
            tableBody.innerHTML = "<tr><td colspan='6' class='p-4 text-center'>Arsip tidak memiliki data.</td></tr>";
            return;
        }

        snap.docs.forEach((doc, idx) => {
            try {
                const item = doc.data();
                const d = parseFloat(item.debet) || 0;
                const k = parseFloat(item.kredit) || 0;
                
                // Tambahkan ke total keseluruhan
                totalDebet += d;
                totalKredit += k;
                
                saldo += (d - k);
                const urutan = Number(idx) + 1;

                tableBody.innerHTML += `
                    <tr class="border-b border-gray-100 text-[11px] md:text-sm uppercase hover:bg-gray-50">
                        <td class="p-2 text-center border border-gray-200 bg-gray-50 font-bold text-gray-700">${urutan}</td>
                        <td class="p-2 text-center border border-gray-200">${item.tanggal || '-'}</td>
                        <td class="p-2 border border-gray-200">${item.keterangan || '-'}</td>
                        <td class="p-2 text-right border border-gray-200">${d > 0 ? new Intl.NumberFormat('id-ID').format(d) : "-"}</td>
                        <td class="p-2 text-right text-red-500 border border-gray-200">${k > 0 ? new Intl.NumberFormat('id-ID').format(k) : "-"}</td>
                        <td class="p-2 text-right font-bold text-green-800 border border-gray-200 bg-green-50/50">${new Intl.NumberFormat('id-ID').format(saldo)}</td>
                    </tr>`;
            } catch (err) {
                console.error("Error pada baris data:", err);
            }
        });

        // MASUKKAN HASIL PENJUMLAHAN KE TFOOT
        elTotalDebet.innerText = new Intl.NumberFormat('id-ID').format(totalDebet);
        elTotalKredit.innerText = new Intl.NumberFormat('id-ID').format(totalKredit);
        
        const saldoAkhir = totalDebet - totalKredit;
        elTotalSaldo.innerText = new Intl.NumberFormat('id-ID').format(saldoAkhir);
        
        // Tambahkan warna merah jika saldo akhir negatif
        if (saldoAkhir < 0) {
            elTotalSaldo.classList.add('text-red-600');
        } else {
            elTotalSaldo.classList.remove('text-red-600');
        }
        
        detailArea.scrollIntoView({ behavior: 'smooth' });
    } catch (e) { 
        alert("Gagal memuat detail: " + e.message); 
    } 
};
        window.hapusArsip = async (namaArsip) => {
    if (!confirm(`Hapus seluruh arsip "${namaArsip}"? Data yang dihapus tidak bisa dikembalikan.`)) return;

    try {
        // 1. Ambil semua data di dalam sub-koleksi 'data' untuk dihapus satu per satu
        const dataRef = collection(db, `users/${currentUID}/arsip/${namaArsip}/data`);
        const snap = await getDocs(dataRef);
        
        const deletePromises = snap.docs.map(d => deleteDoc(d.ref));
        await Promise.all(deletePromises);

        // 2. Hapus dokumen penanda foldernya
        await deleteDoc(doc(db, `users/${currentUID}/arsip`, namaArsip));

        alert("Arsip berhasil dihapus!");
        
        // 3. Refresh tampilan
        location.reload(); 
    } catch (e) {
        alert("Gagal menghapus: " + e.message);
    }
};
    </script>
</head>
<body class="bg-gray-50 p-4 md:p-10 font-sans">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-3xl font-black text-green-900 tracking-tighter uppercase">Arsip Laporan</h1>
                <p class="text-gray-500 text-xs font-bold uppercase tracking-widest text-right">TK Ananda</p>
            </div>
            <a href="index.html" class="text-xs font-black text-blue-500 border-b-2 border-blue-500 pb-1">KEMBALI KE UTAMA</a>
        </div>

        <div id="listArsip" class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-10"></div>

        <div id="detailArea" class="hidden bg-white p-4 md:p-8 rounded-2xl shadow-xl border border-gray-200">
            <h2 id="judulArsip" class="text-xl font-bold text-green-800 mb-6 uppercase border-l-4 border-green-600 pl-4"></h2>
            
            <div class="overflow-x-auto">
                <table class="w-full border-collapse border border-gray-200">
                    <thead>
                        <tr class="bg-green-700 text-white text-[10px] uppercase tracking-widest">
                            <th class="p-3 border border-green-800">NO</th>
                            <th class="p-3 border border-green-800">TANGGAL</th>
                            <th class="p-3 border border-green-800 text-left">KETERANGAN</th>
                            <th class="p-3 border border-green-800 text-right">DEBET</th>
                            <th class="p-3 border border-green-800 text-right">KREDIT</th>
                            <th class="p-3 border border-green-800 text-right">SALDO</th>
                        </tr>
                    </thead>
                    <tbody id="bodyTabelArsip"></tbody>
                    <tfoot class="bg-green-50 font-bold">
            <tr class="text-[11px] md:text-sm text-green-900">
                <td colspan="3" class="p-3 border border-gray-200 text-center uppercase tracking-wider">Jumlah Total</td>
                <td id="totalDebetArsip" class="p-3 border border-gray-200 text-right">0</td>
                <td id="totalKreditArsip" class="p-3 border border-gray-200 text-right">0</td>
                <td id="totalSaldoArsip" class="p-3 border border-gray-200 text-right">0</td>
            </tr>
        </tfoot>
                </table>
            </div>
            <button onclick="window.print()" class="mt-6 w-full bg-gray-800 text-white font-bold py-4 rounded-xl text-sm shadow-lg hover:bg-black transition-all">CETAK LAPORAN INI (PDF)</button>
        </div>
    </div>
</body>
</html>
