<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSB - Tk Ananda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/jpg" href="pic/logo.png">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, setDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1bXxxh-Nd_lm8Fduo_1kiNmI_3KozwUc",
            authDomain: "lku-tk-ananda.firebaseapp.com",
            projectId: "lku-tk-ananda",
            storageBucket: "lku-tk-ananda.firebasestorage.app",
            messagingSenderId: "310516809206",
            appId: "1:310516809206:web:f545e45967fccff5ce1bd7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;
        window.dbPSB = [];

        onAuthStateChanged(auth, (user) => {
            if (user) { 
                currentUser = user; 
                loadDataPSB(); 
            } else { 
                window.location.href = "index.html"; 
            }
        });

        window.formatInput = (input) => {
            let v = input.value.replace(/\D/g, "");
            if (v) input.value = new Intl.NumberFormat('id-ID').format(v);
        };

        window.formatTanggal = (input) => {
            let v = input.value.replace(/\D/g, '').slice(0, 8);
            if (v.length >= 5) input.value = `${v.slice(0, 2)}/${v.slice(2, 4)}/${v.slice(4)}`;
            else if (v.length >= 3) input.value = `${v.slice(0, 2)}/${v.slice(2)}`;
            else input.value = v;
        };

        function cleanNumber(str) { 
            return parseFloat(str.toString().replace(/\./g, "")) || 0; 
        }

        window.simpanPSB = async () => {
            if(!currentUser) return;
            const data = {
                tgl: document.getElementById('psbTgl').value,
                nama: document.getElementById('psbNama').value,
                spp: cleanNumber(document.getElementById('psbSpp').value),
                prasarana: cleanNumber(document.getElementById('psbPrasarana').value),
                seragam: cleanNumber(document.getElementById('psbSeragam').value),
                perlengkapan: cleanNumber(document.getElementById('psbPerlengkapan').value),
                angs1: cleanNumber(document.getElementById('psbAngs1').value),
                angs2: cleanNumber(document.getElementById('psbAngs2').value),
                angs3: cleanNumber(document.getElementById('psbAngs3').value),
                ket: document.getElementById('psbKet').value,
                createdAt: Date.now()
            };

            if(!data.nama || data.tgl.length < 10) {
                return Swal.fire("Lengkapi Data", "Nama & Tanggal (DD/MM/YYYY) wajib diisi", "warning");
            }

            try {
                await addDoc(collection(db, `users/${currentUser.uid}/psb`), data);
                Swal.fire("Berhasil", "Data tersimpan", "success");
                document.getElementById('formPSB').reset();
            } catch (e) { 
                Swal.fire("Error", e.message, "error"); 
            }
        };

        function loadDataPSB() {
            const q = query(collection(db, `users/${currentUser.uid}/psb`), orderBy("createdAt", "desc"));
            onSnapshot(q, (snap) => {
                const body = document.getElementById('bodyPSB');
                body.innerHTML = "";
                const dataTemp = [];
                let i = 1;
                snap.forEach(d => {
                    const r = d.data();
                    dataTemp.push({ id: d.id, ...r });
                    
                    // Hitung Total Tanpa Formulir
                    const total = (r.spp || 0) + (r.prasarana || 0) + (r.seragam || 0) + (r.perlengkapan || 0) + (r.angs1 || 0) + (r.angs2 || 0) + (r.angs3 || 0);
                    
                    body.innerHTML += `
                        <tr class="border-b text-[10px] hover:bg-gray-50 uppercase font-medium">
                            <td class="p-2 border text-center text-gray-400">${i++}</td>
                            <td class="p-2 border text-center">${r.tgl}</td>
                            <td class="p-2 border font-bold text-blue-900">${r.nama}</td>
                            <td class="p-2 border text-right">${r.spp > 0 ? r.spp.toLocaleString('id-ID') : '-'}</td>
                            <td class="p-2 border text-right">${r.prasarana > 0 ? r.prasarana.toLocaleString('id-ID') : '-'}</td>
                            <td class="p-2 border text-right">${r.seragam > 0 ? r.seragam.toLocaleString('id-ID') : '-'}</td>
                            <td class="p-2 border text-right bg-orange-50 font-bold text-orange-800">${r.perlengkapan > 0 ? r.perlengkapan.toLocaleString('id-ID') : '-'}</td>
                            <td class="p-2 border text-right bg-yellow-50/50">${r.angs1 > 0 ? r.angs1.toLocaleString('id-ID') : '-'}</td>
                            <td class="p-2 border text-right bg-yellow-50/50">${r.angs2 > 0 ? r.angs2.toLocaleString('id-ID') : '-'}</td>
                            <td class="p-2 border text-right bg-yellow-50/50">${r.angs3 > 0 ? r.angs3.toLocaleString('id-ID') : '-'}</td>
                            <td class="p-2 border text-right font-black bg-green-100 text-green-900">${total.toLocaleString('id-ID')}</td>
                            <td class="p-2 border text-[9px] normal-case text-gray-500 italic">${r.ket || '-'}</td>
                            <td class="p-2 border text-center">
                                <button onclick="hapusPSB('${d.id}')" class="text-red-400 hover:text-red-600">✕</button>
                            </td>
                        </tr>`;
                });
                window.dbPSB = dataTemp;
            });
        }

        window.hapusPSB = async (id) => { 
            if(confirm("Hapus data pendaftaran ini?")) {
                await deleteDoc(doc(db, `users/${currentUser.uid}/psb`, id)); 
            }
        };

        window.arsipkanPSB = async () => {
            if (!currentUser || window.dbPSB.length === 0) return Swal.fire("Info", "Tidak ada data untuk diarsipkan", "info");
            const { value: namaArsip } = await Swal.fire({
                title: 'Arsipkan Pendaftaran?',
                text: "Data akan dipindah ke folder arsip khusus PSB",
                input: 'text',
                inputPlaceholder: 'Contoh: PSB 2024 - 2025',
                showCancelButton: true,
                confirmButtonText: 'Proses Arsip'
            });
            if (!namaArsip) return;
            Swal.fire({ title: 'Memindahkan data...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                await setDoc(doc(db, `users/${currentUser.uid}/arsip_psb`, namaArsip), { nama: namaArsip, tipe: "PSB", createdAt: Date.now() });
                for (const item of window.dbPSB) {
                    await addDoc(collection(db, `users/${currentUser.uid}/arsip_psb/${namaArsip}/data`), item);
                    await deleteDoc(doc(db, `users/${currentUser.uid}/psb`, item.id));
                }
                Swal.fire('Berhasil!', `Data telah dipindah ke arsip: ${namaArsip}`, 'success');
            } catch (e) { Swal.fire("Gagal", e.message, "error"); }
        };
    </script>
</head>
<body class="bg-gray-100 p-2 md:p-6 font-sans">
    <div class="max-w-[1500px] mx-auto bg-white p-4 shadow-xl rounded-xl border border-gray-200">
        <div class="flex justify-between items-center mb-6 border-b-2 border-blue-50 pb-4">
            <h1 class="text-xl font-black text-blue-900 uppercase tracking-tighter">Pendaftaran PSB TK Ananda</h1>
            <div class="flex gap-2">
                <button onclick="arsipkanPSB()" class="text-[10px] bg-amber-600 text-white px-4 py-2 rounded-lg font-black hover:bg-amber-700 uppercase shadow-md transition-all">Arsipkan Data</button>
                <a href="index.html" class="text-[10px] bg-slate-700 text-white px-4 py-2 rounded-lg font-black hover:bg-slate-800 uppercase shadow-md transition-all">KEMBALI KE LKU</a>
            </div>
        </div>

        <form id="formPSB" class="grid grid-cols-2 md:grid-cols-6 lg:grid-cols-12 gap-3 mb-8 bg-blue-50 p-5 rounded-xl border border-blue-100 shadow-inner">
            <div class="col-span-1">
                <label class="text-[9px] font-black uppercase text-blue-800 mb-1 block">Tanggal</label>
                <input type="text" id="psbTgl" onkeyup="formatTanggal(this)" placeholder="DD/MM/YYYY" maxlength="10" class="w-full p-2 text-xs border border-blue-200 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-400 outline-none">
            </div>
            <div class="col-span-2">
                <label class="text-[9px] font-black uppercase text-blue-800 mb-1 block">Nama Anak</label>
                <input type="text" id="psbNama" placeholder="NAMA LENGKAP" class="w-full p-2 text-xs border border-blue-200 rounded-lg uppercase shadow-sm focus:ring-2 focus:ring-blue-400 outline-none">
            </div>
            <div>
                <label class="text-[9px] font-black uppercase text-blue-800 mb-1 block">SPP</label>
                <input type="text" id="psbSpp" onkeyup="formatInput(this)" placeholder="0" class="w-full p-2 text-xs border border-blue-200 rounded-lg text-right outline-none">
            </div>
            <div>
                <label class="text-[9px] font-black uppercase text-blue-800 mb-1 block">Prasarana</label>
                <input type="text" id="psbPrasarana" onkeyup="formatInput(this)" placeholder="0" class="w-full p-2 text-xs border border-blue-200 rounded-lg text-right outline-none">
            </div>
            <div>
                <label class="text-[9px] font-black uppercase text-blue-800 mb-1 block">Seragam</label>
                <input type="text" id="psbSeragam" onkeyup="formatInput(this)" placeholder="0" class="w-full p-2 text-xs border border-blue-200 rounded-lg text-right outline-none">
            </div>
            <div>
                <label class="text-[9px] font-black uppercase text-orange-800 mb-1 block">Perlengkapan</label>
                <input type="text" id="psbPerlengkapan" onkeyup="formatInput(this)" placeholder="0" class="w-full p-2 text-xs border border-orange-200 rounded-lg text-right bg-orange-50 outline-none">
            </div>
            <div class="col-span-2 border-l border-blue-200 pl-3">
                <label class="text-[8px] font-black text-amber-800 uppercase block text-center mb-1">Angsuran Kegiatan</label>
                <div class="flex gap-1">
                    <input type="text" id="psbAngs1" onkeyup="formatInput(this)" placeholder="1x" class="w-1/3 p-2 text-[10px] border border-amber-200 rounded-lg text-right outline-none bg-amber-50/30">
                    <input type="text" id="psbAngs2" onkeyup="formatInput(this)" placeholder="2x" class="w-1/3 p-2 text-[10px] border border-amber-200 rounded-lg text-right outline-none bg-amber-50/30">
                    <input type="text" id="psbAngs3" onkeyup="formatInput(this)" placeholder="3x" class="w-1/3 p-2 text-[10px] border border-amber-200 rounded-lg text-right outline-none bg-amber-50/30">
                </div>
            </div>
            <div class="col-span-1">
                <label class="text-[9px] font-black uppercase text-blue-800 mb-1 block">Keterangan</label>
                <input type="text" id="psbKet" placeholder="..." class="w-full p-2 text-xs border border-blue-200 rounded-lg outline-none">
            </div>
            <div class="flex items-end">
                <button type="button" onclick="simpanPSB()" class="w-full bg-blue-700 text-white py-2 rounded-lg font-black text-[10px] hover:bg-blue-800 shadow-lg transition-all uppercase tracking-widest">SIMPAN</button>
            </div>
        </form>

        <div class="overflow-x-auto shadow-2xl rounded-xl border border-gray-300">
            <table class="w-full border-collapse">
                <thead>
                    <tr class="bg-blue-900 text-white text-[9px] uppercase tracking-wider">
                        <th rowspan="2" class="p-3 border-r border-blue-800 w-10">No</th>
                        <th rowspan="2" class="p-3 border-r border-blue-800 w-24">Tanggal</th>
                        <th rowspan="2" class="p-3 border-r border-blue-800">Nama Anak</th>
                        <th rowspan="2" class="p-3 border-r border-blue-800">SPP</th>
                        <th rowspan="2" class="p-3 border-r border-blue-800">Prasarana</th>
                        <th rowspan="2" class="p-3 border-r border-blue-800">Seragam</th>
                        <th rowspan="2" class="p-3 border-r border-blue-800 bg-orange-800">Perlengkapan</th>
                        <th colspan="3" class="p-2 border-b border-blue-800 bg-amber-700 text-center">Angsuran Kegiatan</th>
                        <th rowspan="2" class="p-3 border-r border-blue-800 bg-green-800">Total</th>
                        <th rowspan="2" class="p-3 border-r border-blue-800">Keterangan</th>
                        <th rowspan="2" class="p-3 w-8"></th>
                    </tr>
                    <tr class="bg-amber-600 text-white text-[8px] uppercase">
                        <th class="p-2 border-r border-amber-500 w-20">Ke-1</th>
                        <th class="p-2 border-r border-amber-500 w-20">Ke-2</th>
                        <th class="p-2 border-r border-amber-500 w-20">Ke-3</th>
                    </tr>
                </thead>
                <tbody id="bodyPSB" class="bg-white"></tbody>
            </table>
        </div>
    </div>
</body>
</html>
